service: adira

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1
  memorySize: 512
  timeout: 120
  environment:
    AWS_ACCOUNT_ID: ${env:AWS_ACCOUNT_ID}
    DYNAMODB_TABLE: adira-teachers
    SQS_QUEUE_URL: https://sqs.ap-south-1.amazonaws.com/951921971513/adira-jobs
    S3_OUTPUTS_BUCKET: adira-outputs
    S3_RAW_BUCKET: adira-ncert-raw
    VERIFY_TOKEN: adira_secret_2026
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource: arn:aws:dynamodb:ap-south-1:*:table/adira-teachers
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
            - s3:ListBucket
          Resource:
            - arn:aws:s3:::adira-outputs
            - arn:aws:s3:::adira-outputs/*
            - arn:aws:s3:::adira-ncert-raw
            - arn:aws:s3:::adira-ncert-raw/*
        - Effect: Allow
          Action:
            - sqs:SendMessage
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
          Resource: arn:aws:sqs:ap-south-1:*:adira-jobs
        - Effect: Allow
          Action:
            - secretsmanager:GetSecretValue
          Resource: arn:aws:secretsmanager:ap-south-1:*:secret:adira/*

functions:
  webhook:
    handler: src/lambdas/webhook.handler
    memorySize: 256
    timeout: 10
    url: true
    events:
      - httpApi:
          path: /webhook
          method: GET
      - httpApi:
          path: /webhook
          method: POST

  processor:
    handler: src/lambdas/processor.handler
    memorySize: 1024
    timeout: 120
    events:
      - sqs:
          arn: arn:aws:sqs:ap-south-1:951921971513:adira-jobs
          batchSize: 1

plugins:
  - serverless-offline

package:
  exclude:
    - node_modules/pdf2json/**
    - ncert-data/**
    - .git/**
    - test*.js
    - process_ncert.js
    - scan.js
    - rename_ncert.js
    - fix_*.js
